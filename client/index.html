<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PizzaByte — Craft your perfect pizza from scratch. Choose base, sauce, cheese & toppings. Fast delivery, real-time tracking, and secure Razorpay payments." />
    <meta name="theme-color" content="#fffdfa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f1a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="darkreader-lock" content="true" />
    <title>PizzaByte - Homepage</title>
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('theme');
          var theme = saved || 'light';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
